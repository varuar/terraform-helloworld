name: Deploy to EC2

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    steps:
      # Checks out your repository under $GITHUB_WORKSPACE so your job can access it
      - name: Checkout code
        uses: actions/checkout@v2
      
      # Deploy to EC2 instance using SSH
      - name: Deploy to EC2
        run: |
          # Replace with your EC2 SSH details and destination path
          ssh -i "C:/Users/2018v/OneDrive/Desktop/sreyo/keys/ec2keypair.pem" ec2-user@ec2-52-14-237-205.us-east-2.compute.amazonaws.com "mkdir -p /var/www/html"
          scp -i "C:/Users/2018v/OneDrive/Desktop/sreyo/keys/ec2keypair.pem" "C:\Users\2018v\OneDrive\Desktop\sreyo\automationproject\hello.html" ec2-user@ec2-52-14-237-205.us-east-2.compute.amazonaws.com:/var/www/html
